<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>
  <!-- Scales of Justice icon -->
  <g transform="translate(50, 50)" fill="white">
    <!-- Pillar / balance beam -->
    <rect x="-2" y="-35" width="4" height="55" rx="2"/>
    <!-- Balance arm -->
    <rect x="-30" y="-35" width="60" height="4" rx="2"/>
    <!-- Left pan -->
    <path d="M -30 -31 L -42 -10 L -18 -10 Z" fill="white" opacity="0.9"/>
    <ellipse cx="-30" cy="-10" rx="12" ry="3" fill="white" opacity="0.8"/>
    <!-- Right pan -->
    <path d="M 30 -31 L 18 -10 L 42 -10 Z" fill="white" opacity="0.9"/>
    <ellipse cx="30" cy="-10" rx="12" ry="3" fill="white" opacity="0.8"/>
    <!-- Base -->
    <rect x="-15" y="20" width="30" height="4" rx="2"/>
    <rect x="-8" y="18" width="16" height="4" rx="2"/>
  </g>
</svg>
